services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leados
      POSTGRES_PASSWORD: leados
      POSTGRES_DB: leados
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://leados:leados@db:5432/leados

volumes:
  pgdata:
